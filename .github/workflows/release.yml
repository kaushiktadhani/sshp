name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sshp

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_suffix: x86_64-apple-darwin.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive_suffix: aarch64-apple-darwin.tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: x86_64-unknown-linux-gnu.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_suffix: aarch64-unknown-linux-gnu.tar.gz
            use_cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_suffix: x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          BINARY_PATH=target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          ARCHIVE=${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}
          tar czf "$ARCHIVE" -C "$(dirname $BINARY_PATH)" "$(basename $BINARY_PATH)"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $BinaryPath = "target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe"
          $Archive = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}"
          Compress-Archive -Path $BinaryPath -DestinationPath $Archive
          $Hash = (Get-FileHash $Archive -Algorithm SHA256).Hash.ToLower()
          "$Hash  $Archive" | Out-File -FilePath "$Archive.sha256" -Encoding ascii
          echo "ARCHIVE=$Archive" >> $env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
